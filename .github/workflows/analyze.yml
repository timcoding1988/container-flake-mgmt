name: Analyze Flaky Tests

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to analyze'
        required: false
        default: '7'

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o flake-detect ./cmd/flake-detect

      - name: Run Analysis
        timeout-minutes: 30
        env:
          CIRRUS_API_TOKEN: ${{ secrets.CIRRUS_API_TOKEN }}
        run: |
          ./flake-detect \
            --repo containers/podman \
            --days ${{ github.event.inputs.days || '7' }} \
            --output docs/ \
            --workers 10 \
            --verbose

      - name: Upload JSON artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: flakiness-data
          path: data/results/
          retention-days: 30

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: analyze
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
