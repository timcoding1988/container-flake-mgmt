name: Analyze Flaky Tests

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to analyze'
        required: false
        default: '7'

permissions:
  contents: read

# Only one analysis at a time
concurrency:
  group: analyze
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o flake-detect ./cmd/flake-detect

      - name: Run Analysis
        timeout-minutes: 30
        env:
          CIRRUS_API_TOKEN: ${{ secrets.CIRRUS_API_TOKEN }}
        run: |
          ./flake-detect \
            --repo containers/podman \
            --days ${{ github.event.inputs.days || '7' }} \
            --output docs/ \
            --workers 5 \
            --verbose

      - name: Upload JSON data
        uses: actions/upload-artifact@v4
        with:
          name: flakiness-data
          path: data/results/
          retention-days: 30

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: flakiness-report
          path: docs/
          retention-days: 30
